name: Homebrew

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Check synchronized formulae
        run: scripts/sync-formulae.sh --check

      - name: Validate Ruby syntax
        run: |
          for formula in Formula/*.rb; do
            ruby -c "${formula}"
          done

      - name: Reject stale compose install lanes
        run: |
          set -euo pipefail
          if grep -R -n -E 'homebrew-develop|develop-debug|container-compose-plugin-develop|sources/container-compose.*:.*develop' \
            README.md Formula/container-compose.rb Formula/container-compose-snapshot.rb; then
            printf 'stale container-compose develop install lane reference found\n' >&2
            exit 1
          fi

      - name: Inspect tap formulae
        run: |
          brew tap stephenlclarke/tap "${GITHUB_WORKSPACE}"
          brew trust --tap stephenlclarke/tap
          for formula in Formula/*.rb; do
            name="$(basename "${formula}" .rb)"
            brew info --formula "stephenlclarke/tap/${name}"
          done
          brew untap stephenlclarke/tap
