name: Homebrew

on:
  push:
    branches:
      - main
    paths:
      - "Formula/**"
      - "INSTALL.md"
      - "README.md"
      - "scripts/sync-formulae.sh"
      - ".github/workflows/homebrew.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Formula/**"
      - "INSTALL.md"
      - "README.md"
      - "scripts/sync-formulae.sh"
      - ".github/workflows/homebrew.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check synchronized formulae
        run: scripts/sync-formulae.sh --check

      - name: Validate Ruby syntax
        run: |
          for formula in Formula/*.rb; do
            ruby -c "${formula}"
          done

      - name: Reject stale compose install lanes
        run: |
          set -euo pipefail
          if grep -R -n -E 'homebrew-develop|develop-debug|container-compose-plugin-develop|container-compose-snapshot|snapshot-bootstrap|snapshot/.+debug|sources/container-compose.*:.*develop' \
            README.md INSTALL.md Formula/*.rb; then
            printf 'stale compose develop or snapshot install lane reference found\n' >&2
            exit 1
          fi

      - name: Select formulae for Homebrew smoke
        id: formulae
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]]; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            *)
              find Formula -maxdepth 1 -type f -name '*.rb' | sort > "$changed_files"
              ;;
          esac

          grep -E '^Formula/[^/]+\.rb$' "$changed_files" | sort -u > "${RUNNER_TEMP}/formulae.txt" || true
          if [[ ! -s "${RUNNER_TEMP}/formulae.txt" && "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            find Formula -maxdepth 1 -type f -name '*.rb' | sort > "${RUNNER_TEMP}/formulae.txt"
          fi

          {
            printf 'paths<<EOF\n'
            cat "${RUNNER_TEMP}/formulae.txt"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Tap local formulae
        run: |
          set -euo pipefail
          brew tap stephenlclarke/tap "${GITHUB_WORKSPACE}"
          brew trust --tap stephenlclarke/tap

      - name: Audit selected formulae
        env:
          FORMULA_PATHS: ${{ steps.formulae.outputs.paths }}
        run: |
          set -euo pipefail
          while IFS= read -r formula; do
            [[ -n "$formula" ]] || continue
            name="$(basename "${formula}" .rb)"
            brew audit --formula --strict --online "stephenlclarke/tap/${name}"
          done <<< "$FORMULA_PATHS"

      - name: Fetch selected formula archives
        env:
          FORMULA_PATHS: ${{ steps.formulae.outputs.paths }}
        run: |
          set -euo pipefail
          while IFS= read -r formula; do
            [[ -n "$formula" ]] || continue
            name="$(basename "${formula}" .rb)"
            brew fetch --formula --force "stephenlclarke/tap/${name}"
          done <<< "$FORMULA_PATHS"

      - name: Install and test selected formulae
        env:
          FORMULA_PATHS: ${{ steps.formulae.outputs.paths }}
        run: |
          set -euo pipefail
          while IFS= read -r formula; do
            [[ -n "$formula" ]] || continue
            name="$(basename "${formula}" .rb)"
            brew install --formula "stephenlclarke/tap/${name}"
            brew test "stephenlclarke/tap/${name}"
          done <<< "$FORMULA_PATHS"

      - name: Inspect selected formulae
        env:
          FORMULA_PATHS: ${{ steps.formulae.outputs.paths }}
        run: |
          set -euo pipefail
          while IFS= read -r formula; do
            [[ -n "$formula" ]] || continue
            name="$(basename "${formula}" .rb)"
            brew info --formula "stephenlclarke/tap/${name}"
          done <<< "$FORMULA_PATHS"
