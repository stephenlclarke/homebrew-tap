name: Homebrew

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Check synchronized formulae
        run: scripts/sync-formulae.sh --check

      - name: Validate Ruby syntax
        run: |
          for formula in Formula/*.rb; do
            ruby -c "${formula}"
          done

      - name: Inspect tap formulae
        run: |
          brew tap stephenlclarke/tap "${GITHUB_WORKSPACE}"
          for formula in Formula/*.rb; do
            name="$(basename "${formula}" .rb)"
            brew info --formula "stephenlclarke/tap/${name}"
          done
          brew untap stephenlclarke/tap
